<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Confirmación de Liberación</title>
<style>
/* ... mismos estilos que ya tienes, sin cambios ... */
</style>
</head>
<body>
<div class="card">
<h2>Confirmación requerida</h2>
<p>Debes confirmar antes de continuar con la liberación.</p>
<div class="info" id="details"></div>
<div id="status"></div>
<div id="controls">
<input type="checkbox" id="check">
<label for="check">Confirmo validación operativa</label>
<br><br>
<button id="btn" class="btn" disabled>Continuar</button>
</div>
</div>

<script>
// Leer SOLO el token — ya no hay parámetros individuales
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get("token") || "";

const check = document.getElementById("check");
const btn = document.getElementById("btn");
const status = document.getElementById("status");
const controls = document.getElementById("controls");
const details = document.getElementById("details");

if(!token){
  status.innerHTML = `<div class="expired">⛔ Enlace inválido: falta el token.</div>`;
  controls.style.display = "none";
} else {
  // Decodificar SOLO la parte del payload (antes del punto) para MOSTRAR datos.
  // Esto es informativo únicamente — nunca se reenvían estos campos sueltos,
  // ni se confía en ellos para la lógica de expiración (eso lo valida el servidor).
  try {
    const [payloadB64] = token.split(".");
    const payloadJson = JSON.parse(atob(payloadB64.replace(/-/g,'+').replace(/_/g,'/')));

    details.innerHTML = `
      <strong>Usuario:</strong> ${payloadJson.usuario || "No informado"}<br>
      <strong>Host:</strong> ${payloadJson.host || "No informado"}<br>
      <strong>Caso:</strong> ${payloadJson.caso || "No informado"}<br>
      <strong>CDU:</strong> ${payloadJson.cdu || "No informado"}
    `;

    // Nota: mostramos el exp solo como referencia visual. La validación
    // REAL de expiración y firma la hace el servidor al recibir el token.
    const now = Math.floor(Date.now()/1000);
    if (payloadJson.exp && now > payloadJson.exp) {
      status.innerHTML = `<div class="expired">⛔ Este enlace probablemente expiró.</div>`;
      controls.style.display = "none";
    } else {
      status.innerHTML = `<div class="valid">✅ Enlace recibido, pendiente de confirmación.</div>`;

      check.addEventListener("change", () => {
        btn.disabled = !check.checked;
        btn.classList.toggle("active", check.checked);
      });

      btn.onclick = () => {
        // Ya NO reconstruimos parámetros individuales.
        // Reenviamos el token completo, intacto, a index.html
        window.location.href = "index.html?token=" + encodeURIComponent(token);
      };
    }
  } catch(e) {
    status.innerHTML = `<div class="expired">⛔ Token malformado.</div>`;
    controls.style.display = "none";
  }
}
</script>
</body>
</html>
