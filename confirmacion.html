<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Confirmación</title>

<style>
body{font-family:Arial; background:#f4f7f9; text-align:center; padding:40px;}
.card{background:#fff; padding:30px; border-radius:10px; max-width:500px; margin:auto;}
.btn{background:#ccc; color:#666; padding:12px 18px; border:none; border-radius:8px; cursor:not-allowed;}
.btn.active{background:#c62828; color:#fff; cursor:pointer;}
</style>

</head>

<body>

<div class="card">

<h2>Confirmación requerida</h2>

<p>Debes confirmar antes de continuar.</p>

<input type="checkbox" id="check">
<label for="check">Confirmo validación</label>

<br><br>

<button id="btn" class="btn" disabled>Continuar</button>

</div>

<script>
const params = window.location.search;

const check = document.getElementById("check");
const btn = document.getElementById("btn");

check.addEventListener("change", () => {
  btn.disabled = !check.checked;
  btn.classList.toggle("active", check.checked);
});

btn.onclick = () => {
  window.location.href = "index.html" + params;
};
</script>

</body>
</html>
