<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solicitud enviada</title>

<style>
body{
margin:0;
padding:40px;
background:#f4f7f9;
font-family:'Segoe UI', Arial, sans-serif;
text-align:center;
}

.card{
max-width:600px;
margin:auto;
background:#ffffff;
padding:40px;
border-radius:10px;
box-shadow:0 8px 24px rgba(15,23,42,0.08);
}

h2{
color:#f39c12;
}

p{
color:#374151;
font-size:14px;
line-height:1.6;
}

.info{
margin-top:20px;
background:#f8f9fa;
padding:15px;
border-radius:8px;
text-align:left;
font-size:14px;
line-height:1.8;
}
</style>
</head>
<body>

<div class="card">

<h2>⚠️ Solicitud de desbloqueo enviada</h2>

<p>
La ejecución de la acción ha sido <strong>solicitada correctamente</strong>.
</p>

<p>
El proceso de desbloqueo será validado y ejecutado por la plataforma de automatización.
</p>

<p>
<strong>Redirigiendo automáticamente...</strong>
</p>

<div class="info">
Caso: <strong id="caso"></strong><br>
Usuario: <strong id="usuario"></strong><br>
Host: <strong id="host"></strong><br>
CDU: <strong id="cdu"></strong>
</div>

</div>

<script>

// Leer parámetros
const params = new URLSearchParams(window.location.search);

const usuarios = params.get("usuarios") || "";
const ip = params.get("ip") || "";
const host = params.get("host") || "";
const caso = params.get("caso") || "";
const cdu = params.get("cdu") || "";
const herramienta = params.get("herramienta") || "";
const timestamp = params.get("timestamp") || "";
const jefe = params.get("jefe") || "";

// Debug
console.log("Herramienta enviada a Torq:", herramienta);

// Mostrar datos
document.getElementById("caso").textContent = caso || "No informado";
document.getElementById("usuario").textContent = usuarios || "No informado";
document.getElementById("host").textContent = host || "No informado";
document.getElementById("cdu").textContent = cdu || "No informado";

// Construir URL webhook
const webhookUrl =
"https://hooks.torq.io/v1/webhooks/873949e9-571e-43ad-8494-1ea249aa60c9"
+ "?usuarios=" + encodeURIComponent(usuarios)
+ "&ip=" + encodeURIComponent(ip)
+ "&host=" + encodeURIComponent(host)
+ "&caso=" + encodeURIComponent(caso)
+ "&cdu=" + encodeURIComponent(cdu)
+ "&herramienta=" + encodeURIComponent(herramienta)
+ "&timestamp=" + encodeURIComponent(timestamp)
+ "&jefe=" + encodeURIComponent(jefe);

console.log("Redirigiendo a Torq:", webhookUrl);

// Esperar 2 segundos y redirigir
setTimeout(() => {
window.location.href = webhookUrl;
}, 2000);

</script>

</body>
</html>
