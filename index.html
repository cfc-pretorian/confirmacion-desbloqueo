<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acción ejecutada</title>
  <style>
    body{
      margin:0;
      padding:40px;
      background:#f4f7f9;
      font-family:'Segoe UI', Arial, sans-serif;
      text-align:center;
    }

    .card{
      max-width:600px;
      margin:auto;
      background:#ffffff;
      padding:40px;
      border-radius:10px;
      box-shadow:0 8px 24px rgba(15,23,42,0.08);
    }

    h2{
      color:#16a34a;
    }

    p{
      color:#374151;
      font-size:14px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>✅ Acción ejecutada correctamente</h2>

  <p>
    El usuario o activo asociado al caso ha sido <strong>desbloqueado</strong>.
  </p>

  <p>
    Caso: <strong id="caso"></strong><br>
    Usuario: <strong id="usuario"></strong><br>
    Host: <strong id="host"></strong>
  </p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);

  document.getElementById("caso").textContent = params.get("caso") || "No informado";
  document.getElementById("usuario").textContent = params.get("usuarios") || "No informado";
  document.getElementById("host").textContent = params.get("host") || "No informado";
</script>

</body>
</html>
